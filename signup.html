<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skapa Konto - Nara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1f2025;
      --muted: #5d6370;
      --primary: #136f63;
      --accent: #2e86ab;
      --line: #e8dfd1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Outfit", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(46, 134, 171, 0.15), transparent 35%),
        radial-gradient(circle at 85% 10%, rgba(242, 166, 90, 0.2), transparent 40%),
        linear-gradient(180deg, #fdf8ee 0%, #f6f1e8 100%);
      color: var(--ink);
    }
    .card {
      width: min(540px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 24px 48px rgba(15, 19, 28, 0.16);
    }
    h1 { font-family: "Space Grotesk", sans-serif; margin-bottom: 8px; }
    p { color: var(--muted); margin-bottom: 14px; }
    .price-box {
      border: 1px solid #dfe7f3;
      background: #f7fbff;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      color: #23405e;
      font-weight: 600;
    }
    form { display: grid; gap: 10px; }
    label { font-size: .92rem; font-weight: 600; }
    input {
      width: 100%;
      border: 1px solid #d8dfeb;
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      background: #fbfdff;
      color: var(--ink);
    }
    input:focus {
      outline: 2px solid rgba(46, 134, 171, 0.32);
      border-color: #6ca9c3;
    }
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    a { color: #285f9a; text-decoration: none; }
    a:hover { text-decoration: underline; }
    #status { min-height: 20px; color: #0f6a52; font-weight: 600; margin-top: 8px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Skapa konto</h1>
    <p>Skapa konto snabbt och enkelt.</p>
    <div id="priceBox" class="price-box" hidden></div>
    <form id="signupForm">
      <label for="nameInput">Namn</label>
      <input id="nameInput" name="name" type="text" required placeholder="Ditt namn" />
      <label for="emailInput">E-post</label>
      <input id="emailInput" name="email" type="email" required placeholder="du@email.se" />
      <label for="passwordInput">Lösenord</label>
      <input id="passwordInput" name="password" type="password" minlength="6" required placeholder="Minst 6 tecken" />
      <button class="btn" id="submitBtn" type="submit">Skapa konto</button>
    </form>
    <p id="status"></p>
    <div class="row">
      <a href="login.html">Har du redan konto? Logga in</a>
      <a href="pip.html">Till startsidan</a>
    </div>
  </main>

  <script>
    const form = document.getElementById('signupForm');
    const statusText = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');
    const priceBox = document.getElementById('priceBox');
    const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8081' : '';
    let paymentEnabled = false;
    let signupPriceSek = 79;

    async function apiPost(path, body) {
      const response = await fetch(`${API_BASE}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.error || 'Något gick fel.');
      return payload;
    }

    async function loadPaymentConfig() {
      try {
        const response = await fetch(`${API_BASE}/api/payments/status`);
        const payload = await response.json();
        paymentEnabled = !!payload.enabled;
        signupPriceSek = Number(payload.amountSek || 79);
      } catch {
        paymentEnabled = false;
        signupPriceSek = 79;
      }

      if (paymentEnabled) {
        priceBox.hidden = false;
        priceBox.textContent = `${signupPriceSek} kr ger full tillgång i 1 månad.`;
        submitBtn.textContent = `Betala ${signupPriceSek} kr för 1 månad`;
      } else {
        priceBox.hidden = true;
        submitBtn.textContent = 'Skapa konto';
      }
    }

    async function completePaidSignupFromUrl() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('paid') !== '1') return;

      const pendingId = String(params.get('pending') || '');
      const sessionId = String(params.get('session_id') || '');
      if (!pendingId || !sessionId) return;

      statusText.textContent = 'Verifierar betalning och skapar konto...';
      submitBtn.disabled = true;
      try {
        const payload = await apiPost('/api/payments/complete-signup', { pendingId, sessionId });
        localStorage.setItem('naraAuthToken', payload.token);
        localStorage.setItem('naraAccount', JSON.stringify(payload.user));
        localStorage.setItem('naraSession', '1');
        statusText.textContent = `Konto klart! Välkommen, ${payload.user.name}.`;
        window.history.replaceState({}, '', `${window.location.pathname}`);
        setTimeout(() => {
          window.location.href = `${API_BASE || ''}/pip.html#memberArea`;
        }, 800);
      } catch (error) {
        statusText.textContent = error.message || 'Kunde inte verifiera betalning.';
      } finally {
        submitBtn.disabled = false;
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const data = new FormData(form);
      const name = String(data.get('name') || '').trim();
      const email = String(data.get('email') || '').trim();
      const password = String(data.get('password') || '');

      if (!name || !email || password.length < 6) {
        statusText.textContent = 'Fyll i alla fält korrekt.';
        return;
      }

      submitBtn.disabled = true;
      try {
        if (paymentEnabled) {
          const payload = await apiPost('/api/payments/create-signup-checkout', { name, email, password });
          if (payload.checkoutUrl) {
            window.location.href = payload.checkoutUrl;
            return;
          }
          statusText.textContent = 'Kunde inte starta betalning.';
        } else {
          const payload = await apiPost('/api/auth/register', { name, email, password });
          localStorage.setItem('naraAuthToken', payload.token);
          localStorage.setItem('naraAccount', JSON.stringify(payload.user));
          localStorage.setItem('naraSession', '1');
          statusText.textContent = `Konto skapat! Välkommen, ${payload.user.name}.`;
          form.reset();
          setTimeout(() => {
            window.location.href = `${API_BASE || ''}/pip.html#memberArea`;
          }, 700);
        }
      } catch (error) {
        statusText.textContent = error.message || 'Servern svarar inte. Starta servern och försök igen.';
      } finally {
        submitBtn.disabled = false;
      }
    });

    loadPaymentConfig();
    completePaidSignupFromUrl();
    if (new URLSearchParams(window.location.search).get('cancel') === '1') {
      statusText.textContent = 'Betalningen avbröts. Du kan försöka igen när du vill.';
    }
  </script>
</body>
</html>
