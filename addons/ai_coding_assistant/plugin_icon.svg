<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated logo with text phrases">
  <!-- Outer circle -->
  <circle cx="64" cy="64" r="62" fill="#0E1621" stroke="#00FFFF" stroke-width="4"/>
  
  <!-- Robot face silhouette -->
  <path d="M32 40 h64 v36 a12 12 0 0 1 -12 12 h-40 a12 12 0 0 1 -12 -12 z" fill="#00FFFF" opacity="0.1"/>
  <rect x="32" y="40" width="64" height="48" rx="12" ry="12" fill="none" stroke="#00FFFF" stroke-width="4"/>
  
  <!-- Eyes -->
  <circle cx="48" cy="64" r="8" fill="#00FFFF"/>
  <circle cx="80" cy="64" r="8" fill="#00FFFF"/>
  <circle cx="80" cy="64" r="3" fill="#0E1621"/>
  
  <!-- Pixel-style smile -->
  <path d="M54 84 h20" stroke="#00FFFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Neural core -->
  <g transform="translate(64, 48)">
    <circle cx="0" cy="0" r="12" fill="#00FFFF" opacity="0.2"/>
    <circle cx="0" cy="0" r="4" fill="#00FFFF"/>
    <path d="M-10 -10 L10 10 M-10 10 L10 -10" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Animated Text -->
  <text x="64" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600" opacity="1">
    <tspan id="text1">Grandpa EJ</tspan>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.33;0.34;1" dur="6s" repeatCount="indefinite" begin="0s"/>
  </text>

  <text x="64" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600" opacity="0">
    <tspan id="text2">Godot 4</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.33;0.34;0.66;1" dur="6s" repeatCount="indefinite" begin="0s"/>
  </text>

  <text x="64" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600" opacity="0">
    <tspan id="text3">Ai Assistance</tspan>
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.66;0.67;0.99;1" dur="6s" repeatCount="indefinite" begin="0s"/>
  </text>
</svg>
